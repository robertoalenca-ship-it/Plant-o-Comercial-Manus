name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22022
          script_stop: true
          script: |
            export APP_DIR="${{ secrets.VPS_APP_DIR }}"
            export APP_DOMAIN="${{ secrets.APP_DOMAIN }}"
            export APP_BRANCH="${{ secrets.VPS_APP_BRANCH }}"
            export APP_BRANCH="${APP_BRANCH:-main}"
            cd "$APP_DIR"
            git fetch origin "$APP_BRANCH"
            git checkout "$APP_BRANCH"
            git pull --ff-only origin "$APP_BRANCH"
            chmod +x deploy/vps/deploy.sh
            ./deploy/vps/deploy.sh
